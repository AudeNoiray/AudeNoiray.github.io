name: Prettier Format PR

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  format:
    name: Format repository and create PR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Run formatting
        run: npm run format

      - name: Create Pull Request with formatted files
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "style(ci): apply Prettier formatting to flagged files"
          branch: "chore/prettier-format"
          title: "style(ci): Prettier formatting"
          body: "Auto-format files with Prettier and the Liquid plugin"
